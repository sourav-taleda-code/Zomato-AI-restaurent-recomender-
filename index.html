<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato AI Restaurant Recommender</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --primary: #E03546;
            --background: #f8f9fa;
            --card-bg: #ffffff;
            --text: #2d3748;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: var(--primary);
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        select, input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .budget-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .budget-btn {
            background-color: #edf2f7;
            color: #4a5568;
            border: 1px solid #cbd5e0;
            padding: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .budget-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .diet-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .diet-btn {
            background-color: #edf2f7;
            color: #4a5568;
            border: 1px solid #cbd5e0;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .diet-btn.active.veg {
            background-color: #48bb78;
            color: white;
            border-color: #48bb78;
        }
        .diet-btn.active.non-veg {
            background-color: #e53e3e;
            color: white;
            border-color: #e53e3e;
        }
        button.submit-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 1.5rem;
        }
        button.submit-btn:hover {
            opacity: 0.9;
        }
        .results-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            display: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 1px solid #edf2f7;
        }
        th {
            background-color: #f7fafc;
            font-weight: 600;
        }
        .ai-summary {
            background-color: #ebf8ff;
            border-left: 4px solid #3182ce;
            padding: 1.5rem;
            border-radius: 0 6px 6px 0;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .loader {
            text-align: center;
            display: none;
            font-weight: 600;
            color: var(--primary);
        }
        /* Diet toggle centered below title */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: #fff;
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            width: fit-content;
            margin: -1rem auto 1.5rem auto;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
        }
        .switch-label { user-select: none; }
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }
        .switch input { display: none; }
        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #e53e3e;
            border-radius: 34px;
            transition: background-color 0.3s;
        }
        .slider::before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        input:checked + .slider {
            background-color: #48bb78;
        }
        input:checked + .slider::before {
            transform: translateX(24px);
        }
        #map {
            height: 280px;
            border-radius: 8px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .map-label {
            font-size: 0.8rem;
            color: #718096;
            text-align: center;
            margin-top: -1.5rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zomato AI Restaurant Recommender 🍕</h1>

        <!-- Diet Toggle below title -->
        <div class="top-bar">
            <span class="switch-label" id="dietLabel" style="color:#e53e3e">Non-Veg</span>
            <label class="switch">
                <input type="checkbox" id="dietToggle" onchange="onDietToggle(this)">
                <span class="slider"></span>
            </label>
            <span class="switch-label" id="dietLabelVeg" style="color:#aaa">Veg</span>
        </div>
        <input type="hidden" id="dietInput" value="non-veg">
        
        <!-- Live Location Map -->
        <div id="map"></div>
        <p class="map-label">📍 Your current location detected via browser GPS</p>

        <div class="card">
            <div class="form-group">
                <label for="citySelect">Select Area</label>
                <select id="citySelect">
                    <option value="">Loading areas...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Budget Tier</label>
                <div class="budget-buttons">
                    <button class="budget-btn active" onclick="selectBudget(0, 1000, this)">
                        Budget<br>₹<br>1000
                    </button>
                    <button class="budget-btn" onclick="selectBudget(1000, 2000, this)">
                        Affordable<br>₹<br>2000
                    </button>
                    <button class="budget-btn" onclick="selectBudget(2000, 4000, this)">
                        Mid Range<br>₹<br>4000
                    </button>
                    <button class="budget-btn" onclick="selectBudget(4000, 99999, this)">
                        Expensive<br>₹<br>5000+
                    </button>
                </div>
                <input type="hidden" id="budgetMin" value="0">
                <input type="hidden" id="budgetMax" value="1000">
            </div>

            <button class="submit-btn" onclick="getRecommendations()">Get Recommendations</button>
        </div>

        <div id="loader" class="loader">Querying Zomato & Fetching AI Insights...</div>

        <div id="resultsContainer" class="results-container">
            <div class="card">
                <h2>Top Restaurants</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Cuisines</th>
                            <th>Cost (Two)</th>
                            <th>Rating</th>
                            <th>Location</th>
                        </tr>
                    </thead>
                    <tbody id="restaurantsTableBody"></tbody>
                </table>
            </div>
            
            <div class="card">
                <h2>AI Summary</h2>
                <div id="aiSummary" class="ai-summary"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Fetch cities list on page load
        async function loadCities() {
            try {
                const response = await fetch(`${API_BASE}/api/cities`);
                const data = await response.json();
                const select = document.getElementById('citySelect');
                select.innerHTML = '';
                
                data.cities.forEach(city => {
                    const opt = document.createElement('option');
                    opt.value = city;
                    opt.textContent = city.charAt(0).toUpperCase() + city.slice(1);
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error("Failed to load cities", err);
            }
        }

        function selectBudget(min, max, element) {
            document.getElementById('budgetMin').value = min;
            document.getElementById('budgetMax').value = max;
            document.querySelectorAll('.budget-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        function onDietToggle(el) {
            const value = el.checked ? 'veg' : 'non-veg';
            document.getElementById('dietInput').value = value;
            document.getElementById('dietLabel').style.color = el.checked ? '#aaa' : '#e53e3e';
            document.getElementById('dietLabelVeg').style.color = el.checked ? '#48bb78' : '#aaa';
        }

        // Fetch recommendations from FastAPI Backend
        async function getRecommendations() {
            const city = document.getElementById('citySelect').value;
            const budgetMin = document.getElementById('budgetMin').value;
            const budgetMax = document.getElementById('budgetMax').value;
            const diet = document.getElementById('dietInput').value;
            const loader = document.getElementById('loader');
            const resultsContainer = document.getElementById('resultsContainer');
            
            if (!city) return alert("Please select an area");

            loader.style.display = 'block';
            resultsContainer.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/api/recommend?city=${city}&min_price=${budgetMin}&max_price=${budgetMax}&diet=${diet}`);
                const data = await response.json();
                
                // Populate Table
                const tbody = document.getElementById('restaurantsTableBody');
                tbody.innerHTML = '';
                if (data.restaurants.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">No restaurants found</td></tr>';
                } else {
                    data.restaurants.forEach(r => {
                        const location = r.location || r.city || '';
                        const mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(r.restaurant_name + ' ' + location + ' Bangalore')}`;
                        const row = `<tr>
                            <td><strong>${r.restaurant_name}</strong></td>
                            <td>${r.cuisines}</td>
                            <td>₹${r.average_cost_for_two}</td>
                            <td>⭐ ${r.rating}</td>
                            <td><a href="${mapsUrl}" target="_blank" style="color:#E03546;text-decoration:none;font-weight:600;">📍 ${location}</a></td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                }

                // Populate AI Summary
                document.getElementById('aiSummary').textContent = data.ai_summary;
                
                loader.style.display = 'none';
                resultsContainer.style.display = 'grid';
            } catch (err) {
                console.error("Failed to get recommendations", err);
                loader.style.display = 'none';
                alert("Error fetching recommendations.");
            }
        }

        window.onload = async function() {
            await loadCities();   // wait for dropdown to fill
            initMap();            // then geocode can match against options
        };

        function initMap() {
            // Default center: Bangalore
            const defaultLatLng = [12.9716, 77.5946];
            const map = L.map('map').setView(defaultLatLng, 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Shared helper: reverse geocode latlng, match dropdown, place marker
            let clickMarker = null;
            let cityCoords = null;
            
            // Haversine distance calculation
            function getDistance(lat1, lon1, lat2, lon2) {
                const R = 6371; // km
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                          Math.sin(dLon/2) * Math.sin(dLon/2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            }

            async function pickLocation(latlng) {
                try {
                    // Fetch city coordinates if not already loaded
                    if (!cityCoords) {
                        const coordsRes = await fetch(`${API_BASE}/api/cities/coords`);
                        const coordsData = await coordsRes.json();
                        cityCoords = coordsData.coords || {};
                    }

                    const res = await fetch(
                        `https://nominatim.openstreetmap.org/reverse?lat=${latlng[0]}&lon=${latlng[1]}&format=json`,
                        { headers: { 'Accept-Language': 'en' } }
                    );
                    const geo = await res.json();
                    const addr = geo.address || {};
                    const detectedArea = (addr.suburb || addr.neighbourhood || addr.quarter || addr.city_district || '').toLowerCase().trim();

                    const selectEl = document.getElementById('citySelect');
                    const options = Array.from(selectEl.options).map(o => o.value.toLowerCase());
                    let matchedCity = '';

                    if (detectedArea) {
                        const exact = options.find(o => o === detectedArea);
                        if (exact) {
                            matchedCity = exact;
                        } else {
                            const partial = options.find(o => detectedArea.includes(o) || o.includes(detectedArea));
                            if (partial) matchedCity = partial;
                        }
                    }

                    // If no name match, fallback to finding the nearest coordinate
                    let distanceNote = '';
                    if (!matchedCity && Object.keys(cityCoords).length > 0) {
                        let nearestCity = '';
                        let minDistance = Infinity;
                        
                        for (const [city, coords] of Object.entries(cityCoords)) {
                            const dist = getDistance(latlng[0], latlng[1], coords.lat, coords.lon);
                            if (dist < minDistance) {
                                minDistance = dist;
                                nearestCity = city;
                            }
                        }
                        
                        if (nearestCity) {
                            matchedCity = nearestCity;
                            distanceNote = ` <br><small>(Nearest match: ${minDistance.toFixed(1)}km away)</small>`;
                        }
                    }

                    const label = matchedCity
                        ? `📍 <strong>${matchedCity.charAt(0).toUpperCase() + matchedCity.slice(1)}</strong> auto-selected!${distanceNote}`
                        : `📍 ${detectedArea || 'Unknown area'} — no match in dataset`;

                    // Remove previous click marker if any
                    if (clickMarker) map.removeLayer(clickMarker);
                    clickMarker = L.marker(latlng).addTo(map).bindPopup(label).openPopup();

                    if (matchedCity) selectEl.value = matchedCity;
                    else console.warn('No area match for:', detectedArea);
                } catch (e) {
                    console.error('Reverse geocode failed', e);
                }
            }

            // Auto-detect on load via GPS
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async pos => {
                        const latlng = [pos.coords.latitude, pos.coords.longitude];
                        map.setView(latlng, 14);
                        L.circle(latlng, { radius: 300, color: '#E03546', fillOpacity: 0.15 }).addTo(map);
                        await pickLocation(latlng);
                    },
                    () => {
                        L.marker(defaultLatLng).addTo(map).bindPopup('Location access denied — showing Bangalore').openPopup();
                    }
                );
            } else {
                L.marker(defaultLatLng).addTo(map).bindPopup('Geolocation not supported').openPopup();
            }

            // Click anywhere on map to pick that location
            map.on('click', async e => {
                await pickLocation([e.latlng.lat, e.latlng.lng]);
            });
        }
    </script>
</body>
</html>
